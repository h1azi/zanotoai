<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 188" role="img" aria-label="Zanoto AI Solutions">
  <title>Zanoto AI Solutions</title>

  <!--
    ICON: organic network/node mark — 3D depth via node size variation
    Hub: (120,62) r=11
    Outer nodes vary from r=2.5 (far/small) to r=8 (close/large)
    Spoke thickness also varies — thicker toward close nodes

    Node positions and angles (deliberately asymmetric):
      upper-left  (110, 14) r=6.0  — medium-large
      upper-right (151, 27) r=2.5  — tiny (receding)
      right       (178, 60) r=8.0  — largest (closest, "coming at you")
      lower-right (148,103) r=4.5  — medium-small
      lower-left  ( 76, 96) r=6.5  — medium-large
      left        ( 69, 51) r=3.0  — small (receding)

    Spoke endpoints calculated from circle edges (hub edge → node edge).
  -->

  <!-- Spokes — varying stroke-width enhances depth illusion -->
  <line x1="118" y1="51"  x2="111" y2="20"  stroke="#ffffff" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="127" y1="54"  x2="149" y2="29"  stroke="#ffffff" stroke-width="1.0" stroke-linecap="round"/>
  <line x1="131" y1="62"  x2="170" y2="60"  stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="126" y1="71"  x2="145" y2="99"  stroke="#ffffff" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="111" y1="69"  x2="81"  y2="92"  stroke="#ffffff" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="109" y1="60"  x2="72"  y2="52"  stroke="#ffffff" stroke-width="1.0" stroke-linecap="round"/>

  <!-- Central hub -->
  <circle cx="120" cy="62" r="11" fill="#ffffff"/>

  <!-- Outer nodes — size encodes depth (large = close, small = far) -->
  <circle cx="110" cy="14"  r="6.0" fill="#ffffff"/>  <!-- upper-left,  medium-large -->
  <circle cx="151" cy="27"  r="2.5" fill="#ffffff"/>  <!-- upper-right, tiny/far     -->
  <circle cx="178" cy="60"  r="8.0" fill="#ffffff"/>  <!-- right,       largest/close -->
  <circle cx="148" cy="103" r="4.5" fill="#ffffff"/>  <!-- lower-right, medium-small  -->
  <circle cx="76"  cy="96"  r="6.5" fill="#ffffff"/>  <!-- lower-left,  medium-large  -->
  <circle cx="69"  cy="51"  r="3.0" fill="#ffffff"/>  <!-- left,        small/far      -->


  <!-- ─── WORDMARK ─────────────────────────────── -->
  <text
    x="120" y="150"
    text-anchor="middle"
    font-family="'Palatino Linotype', 'Palatino', 'Book Antiqua', 'Georgia', serif"
    font-weight="700"
    font-size="37"
    letter-spacing="7"
    fill="#ffffff"
    dx="3.5"
  >ZANOTO</text>

  <!-- divider -->
  <line x1="80" y1="157" x2="160" y2="157" stroke="#ffffff" stroke-width="0.5" opacity="0.25"/>

  <!-- ─── SUBTITLE ───────────────────────────────── -->
  <text
    x="120" y="171"
    text-anchor="middle"
    font-family="'Helvetica Neue', 'Helvetica', 'Arial', sans-serif"
    font-weight="300"
    font-size="10.5"
    letter-spacing="5"
    fill="#ffffff"
    opacity="0.60"
    dx="2.5"
  >AI SOLUTIONS</text>

</svg>
